# Verifies build: mvn clean package (tests + shaded JAR). Single workflow — no dependency-graph upload (fails on PRs with default GITHUB_TOKEN).
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      # clean package: runs tests then shaded JAR (single workflow; avoids duplicate runs from maven.yml)
      - name: Build, test, and package
        run: mvn -B clean package
